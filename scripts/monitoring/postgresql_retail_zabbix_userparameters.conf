UserParameter=pgsql.retail.connections.total,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COUNT(*) FROM pg_stat_activity WHERE datname='BD_RETAIL';"

UserParameter=pgsql.retail.connections.active,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COUNT(*) FROM pg_stat_activity WHERE datname='BD_RETAIL' AND state='active';"

UserParameter=pgsql.retail.connections.idle,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COUNT(*) FROM pg_stat_activity WHERE datname='BD_RETAIL' AND state='idle';"

UserParameter=pgsql.retail.long_queries,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COUNT(*) FROM pg_stat_activity WHERE datname='BD_RETAIL' AND state <> 'idle' AND now() - query_start > interval '30 seconds';"

UserParameter=pgsql.retail.locks.waiting,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COUNT(*) FROM pg_locks WHERE NOT granted;"

UserParameter=pgsql.retail.cache_hit_ratio,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT ROUND(blks_hit * 100.0 / NULLIF(blks_hit + blks_read, 0), 2) FROM pg_stat_database WHERE datname='BD_RETAIL';"

UserParameter=pgsql.retail.dead_tuples,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT COALESCE(SUM(n_dead_tup), 0) FROM pg_stat_user_tables WHERE schemaname='retail';"

UserParameter=pgsql.retail.db_size_mb,PGPASSWORD='Zabbix_Monitor_2026*' psql -h localhost -p 5432 -U zbx_monitor -d BD_RETAIL -t -A -c "SELECT ROUND(pg_database_size('BD_RETAIL') / 1024.0 / 1024.0, 2);"
